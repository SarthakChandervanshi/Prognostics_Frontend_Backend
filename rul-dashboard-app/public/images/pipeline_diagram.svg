  </defs>
  <rect width="960" height="200" fill="url(#bg)" rx="12"/>
  <text x="480" y="36" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">Replace with your exported pipeline figure</text>
  <g font-family="system-ui,sans-serif" font-size="13" fill="#e4e4e7">
