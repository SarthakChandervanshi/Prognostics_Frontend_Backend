    <rect x="628" y="72" width="110" height="56" rx="8" fill="#27272a" stroke="#3f3f46"/>
    <text x="683" y="104" text-anchor="middle">Quantiles</text>
    <path d="M744 100 L768 100" stroke="url(#accent)" stroke-width="2"/>
