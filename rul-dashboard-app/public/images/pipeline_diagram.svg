    <rect x="180" y="72" width="120" height="56" rx="8" fill="#27272a" stroke="#3f3f46"/>
    <text x="240" y="104" text-anchor="middle">Features</text>
    <path d="M306 100 L330 100" stroke="url(#accent)" stroke-width="2"/>
